{% extends "layout.html" %}
{% block content %}
<div class="max-w-md mx-auto border border-app rounded-2xl bg-surface p-6">
  <div class="flex flex-col items-center text-center">
    <div class="h-24 w-24 rounded-3xl bg-surface2 border border-app flex items-center justify-center shadow-[0_0_40px_rgba(3,169,244,0.18)]">
      <img class="h-16 w-16" alt="Nexus" src="{{ url_for('static', filename='logo_mark.png') }}"/>
    </div>
    <div class="mt-3 text-sm font-extrabold">Entrar</div>
    <div class="text-xs text-muted">Sapphire & Cyan · Plataforma premium</div>
  </div>
  <form class="mt-4 space-y-3" method="post" action="{{ url_for('auth.login_post') }}">
    <div>
      <label class="text-xs text-muted">E-mail</label>
      <input name="email" class="input mt-1 w-full rounded-xl px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs text-muted">Senha</label>
      <input type="password" name="password" class="input mt-1 w-full rounded-xl px-3 py-2 text-sm" />
    </div>
    <button class="btn-primary w-full rounded-xl px-4 py-2 font-extrabold">Entrar</button>
  </form>
  <div class="mt-3 text-xs text-muted">Novo? <a class="text-brand-2 underline" href="{{ url_for('auth.register') }}">Criar conta</a></div>
</div>
{% endblock %}
