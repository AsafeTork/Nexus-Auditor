{% extends "layout.html" %}
{% block content %}
<div class="max-w-md mx-auto border border-white/10 rounded-2xl bg-slate-900/30 p-6">
  <div class="flex flex-col items-center text-center">
    <div class="h-20 w-20 rounded-3xl bg-slate-950/50 border border-white/10 flex items-center justify-center">
      <img class="h-14 w-14" alt="Nexus" src="{{ url_for('static', filename='favicon.png') }}"/>
    </div>
    <div class="mt-3 text-sm font-extrabold">Entrar</div>
    <div class="text-xs text-slate-400">Sapphire & Cyan · Plataforma premium</div>
  </div>
  <form class="mt-4 space-y-3" method="post" action="{{ url_for('auth.login_post') }}">
    <div>
      <label class="text-xs text-slate-400">E-mail</label>
      <input name="email" class="mt-1 w-full rounded-xl bg-slate-950 border border-white/10 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#1A237E] focus:border-[#1A237E]" />
    </div>
    <div>
      <label class="text-xs text-slate-400">Senha</label>
      <input type="password" name="password" class="mt-1 w-full rounded-xl bg-slate-950 border border-white/10 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-[#1A237E] focus:border-[#1A237E]" />
    </div>
    <button class="w-full rounded-xl px-4 py-2 font-extrabold bg-gradient-to-r from-[#1A237E] to-[#03A9F4] text-white">Entrar</button>
  </form>
  <div class="mt-3 text-xs text-slate-400">Novo? <a class="text-[#03A9F4] underline" href="{{ url_for('auth.register') }}">Criar conta</a></div>
</div>
{% endblock %}
