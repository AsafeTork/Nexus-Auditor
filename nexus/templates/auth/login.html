{% extends "layout.html" %}
{% block body %}
<div class="min-h-screen grid grid-cols-1 md:grid-cols-2">
  <!-- Image column (desktop) -->
  <div class="hidden md:block relative overflow-hidden">
    <img src="{{ url_for('static', filename='login_bg.jpg') }}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-55"/>
    <div class="absolute inset-0" style="background: linear-gradient(90deg, rgba(11,11,12,0.12) 0%, rgba(11,11,12,0.22) 55%, rgba(11,11,12,1) 100%);"></div>
  </div>

  <!-- Form column -->
  <div class="flex items-center justify-center p-6">
    <div class="w-full max-w-sm card card-focus">
      <div class="flex flex-col sm:flex-row sm:items-center gap-4">
        <img class="w-full sm:w-56 max-w-[320px] object-contain" alt="Nexus Auditor" src="{{ url_for('static', filename='logo_login_small.png') }}"/>
        <div class="sm:text-right">
          <div class="page-title tracking-tight">Sign in</div>
          <div class="body-text">Access your workspace</div>
        </div>
      </div>

      <form class="mt-6 flex flex-col gap-4" method="post" action="{{ url_for('auth.login_post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label for="email" class="body-text">Email</label>
          <input id="email" aria-label="Email" name="email" autocomplete="email" class="input mt-4 text-sm" />
        </div>
        <div>
          <label for="password" class="body-text">Password</label>
          <input id="password" aria-label="Password" type="password" name="password" autocomplete="current-password" class="input mt-4 text-sm" />
        </div>
        <button class="btn-primary btn-lg w-full">Sign in</button>
      </form>

      <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <a class="btn-secondary w-full text-center" aria-label="Entrar com Google" href="{{ url_for('auth.oauth_start', provider='google') }}">Google</a>
        <a class="btn-secondary w-full text-center" aria-label="Entrar com GitHub" href="{{ url_for('auth.oauth_start', provider='github') }}">GitHub</a>
      </div>

      <div class="mt-6 body-text">
        New here? <a class="text-brand-2 underline" href="{{ url_for('auth.register') }}">Create account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
