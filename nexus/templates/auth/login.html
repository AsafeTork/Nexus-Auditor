{% extends "layout.html" %}
{% block body %}
<div class="min-h-screen md:flex">
  <!-- Desktop/Tablet left image (47%) -->
  <div class="hidden md:block relative w-[47%] overflow-hidden">
    <img src="{{ url_for('static', filename='login_bg.jpg') }}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-50" style="object-position: 15% 50%;"/>
    <div class="absolute inset-0" style="background: linear-gradient(90deg, rgba(11,11,12,0.10) 0%, rgba(11,11,12,0.20) 55%, rgba(11,11,12,1) 100%);"></div>
  </div>

  <!-- Right login panel -->
  <div class="min-h-screen md:min-h-0 flex-1 md:w-[53%] flex items-center justify-center p-6 relative">
    <div class="w-full max-w-md card">
      <div class="flex flex-col sm:flex-row sm:items-center gap-4">
        <img class="w-full sm:w-56 max-w-[320px] object-contain" alt="Nexus Auditor" src="{{ url_for('static', filename='logo_login_small.png') }}"/>
        <div class="sm:text-right">
          <div class="page-title tracking-tight">Sign in</div>
          <div class="body-text">Access your workspace</div>
        </div>
      </div>

      <form class="mt-6 flex flex-col gap-4" method="post" action="{{ url_for('auth.login_post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label for="email" class="body-text">Email</label>
          <input id="email" aria-label="Email" name="email" autocomplete="email" class="input mt-4 text-sm" />
        </div>
        <div>
          <label for="password" class="body-text">Password</label>
          <input id="password" aria-label="Password" type="password" name="password" autocomplete="current-password" class="input mt-4 text-sm" />
        </div>
        <button class="btn-primary btn-lg w-full">Sign in</button>
      </form>

      <div class="mt-6 flex items-center justify-center gap-4">
        <a class="btn-secondary w-10 h-10 rounded-full p-0 flex items-center justify-center" aria-label="Entrar com Google" href="{{ url_for('auth.oauth_start', provider='google') }}">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M12 11v2.8h6.3c-.3 1.8-2.1 5.2-6.3 5.2-3.8 0-6.9-3.1-6.9-6.9S8.2 5.2 12 5.2c2.2 0 3.6.9 4.4 1.6l1.9-1.9C17 3.6 14.8 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 11.8S6.9 21 12 21c5.9 0 9.1-4.2 9.1-8.2 0-.6-.1-1-.2-1.8H12z"/>
          </svg>
        </a>
        <a class="btn-secondary w-10 h-10 rounded-full p-0 flex items-center justify-center" aria-label="Entrar com GitHub" href="{{ url_for('auth.oauth_start', provider='github') }}">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12 .8a11.2 11.2 0 0 0-3.5 21.8c.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.6-1.5-1.4-1.9-1.4-1.9-1.1-.8.1-.8.1-.8 1.3.1 2 .1 2.6 1.7 1.1 1.9 2.9 1.4 3.6 1.1.1-.8.4-1.4.8-1.7-2.7-.3-5.5-1.3-5.5-6a4.7 4.7 0 0 1 1.3-3.3c-.1-.3-.6-1.6.1-3.3 0 0 1-.3 3.4 1.3a11.6 11.6 0 0 1 6.2 0c2.4-1.6 3.4-1.3 3.4-1.3.7 1.7.3 3 .1 3.3a4.7 4.7 0 0 1 1.3 3.3c0 4.7-2.8 5.7-5.5 6 .4.4.8 1.2.8 2.4V22c0 .3.2.7.8.6A11.2 11.2 0 0 0 12 .8z"/>
          </svg>
        </a>
      </div>

      <div class="mt-6 body-text">
        New here? <a class="text-brand-2 underline" href="{{ url_for('auth.register') }}">Create account</a>
      </div>
    </div>
  </div>
</div>

<!-- Mobile: seção extra para revelar MAIS imagem ao rolar (sem empurrar o login para cima) -->
<div class="md:hidden h-[55vh] relative overflow-hidden">
  <img loading="lazy" src="{{ url_for('static', filename='login_bg.jpg') }}" alt="" class="absolute inset-0 w-full h-full object-cover opacity-45" style="object-position: 15% 50%;"/>
  <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(11,11,12,0.98) 0%, rgba(11,11,12,0.35) 45%, rgba(11,11,12,0.96) 100%);"></div>
</div>
{% endblock %}
