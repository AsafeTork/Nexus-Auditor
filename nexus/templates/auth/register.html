{% extends "layout.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md card p-6">
    <div class="flex items-center justify-between gap-4">
      <img class="h-9 w-auto object-contain" alt="Nexus Auditor" src="{{ url_for('static', filename='logo_login_small.png') }}"/>
      <div class="text-right">
        <div class="text-base font-semibold tracking-tight">Create account</div>
        <div class="text-xs text-muted">Start in under a minute</div>
      </div>
    </div>

    <form class="mt-6 space-y-4" method="post" action="{{ url_for('auth.register_post') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="text-xs text-muted">Organization</label>
        <input name="org_name" class="input mt-2 w-full rounded-xl px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-xs text-muted">Email</label>
        <input name="email" autocomplete="email" class="input mt-2 w-full rounded-xl px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-xs text-muted">Password</label>
        <input type="password" name="password" autocomplete="new-password" class="input mt-2 w-full rounded-xl px-3 py-2 text-sm" />
        <div class="mt-2 text-xs text-muted">Minimum 8 characters.</div>
      </div>
      <button class="btn-primary w-full">Create</button>
    </form>

    <div class="mt-5 text-sm text-muted">
      Already have an account?
      <a class="text-brand-2 underline" href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
