{% extends "layout.html" %}
{% block content %}
<div class="max-w-md mx-auto card p-6">
  <div class="flex flex-col items-center text-center">
    <img class="h-20 w-20" alt="Nexus" src="{{ url_for('static', filename='logo.png') }}"/>
    <div class="mt-3 text-lg font-extrabold tracking-tight">Criar conta</div>
    <div class="text-xs text-muted">Comece em menos de 1 minuto</div>
  </div>
  <form class="mt-4 space-y-3" method="post" action="{{ url_for('auth.register_post') }}">
    <div>
      <label class="text-xs text-muted">Organização</label>
      <input name="org_name" class="input mt-1 w-full rounded-xl px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs text-muted">E-mail</label>
      <input name="email" class="input mt-1 w-full rounded-xl px-3 py-2 text-sm" />
    </div>
    <div>
      <label class="text-xs text-muted">Senha (mín. 8)</label>
      <input type="password" name="password" class="input mt-1 w-full rounded-xl px-3 py-2 text-sm" />
    </div>
    <button class="btn-primary w-full rounded-xl px-4 py-2 font-extrabold">Criar</button>
  </form>
  <div class="mt-3 text-xs text-muted">Já tem conta? <a class="text-brand-2 underline" href="{{ url_for('auth.login') }}">Entrar</a></div>
</div>
{% endblock %}
