{% extends "layout.html" %}
{% set title = "Logs" %}
{% set subtitle = "Support and diagnostics" %}
{% block content %}
<div class="letterhead">
  <div class="flex items-center justify-end gap-4">
    <a class="btn-secondary" href="{{ url_for('admin.admin_home') }}">Back</a>
  </div>

  <!-- Console: terminal geral (somente exibição) -->
  <section class="mt-6 card card-focus">
    <div class="flex items-center justify-between gap-6">
      <div>
        <div class="section-title">Console</div>
        <div class="body-text">Tudo que é erro primeiro, depois o restante (org scope).</div>
      </div>
      <button class="btn-secondary icon-btn" aria-label="Copiar console" onclick="copyText('consoleBox')">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16h8M8 12h8m-7 8h6a2 2 0 0 0 2-2V8l-4-4H9a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/>
        </svg>
      </button>
    </div>

    <textarea id="consoleBox" aria-label="Console" aria-readonly="true" class="mono mt-6 w-full h-[66vh] md:h-[70vh] input text-xs" readonly>
=== DIAGNOSTICS ===
DB={{ "OK" if diag.db.ok else "ERRO" }}{% if not diag.db.ok %} :: {{ diag.db.error }}{% endif %}
REDIS={{ "OK" if diag.redis.ok else "ERRO" }}{% if not diag.redis.ok %} :: {{ diag.redis.error }}{% endif %}
LLM={{ "OK" if diag.llm.ok else "ERRO" }} model={{ diag.llm.model }}{% if not diag.llm.ok %} :: {{ diag.llm.error }}{% endif %}

=== FAILED AUDITS (recent) ===
{% for a in failed_audits %}{{ a.created_utc }} :: error :: {{ a.target_domain or a.id }} :: audit_id={{ a.id }} :: model={{ a.model }}{% if not loop.last %}\n{% endif %}{% else %}(none){% endfor %}

=== ERRORS (audit events) ===
{% for e in error_events %}{{ e.ts_ms }} {{ e.level }} {{ e.layer }} :: {{ e.target_domain }} :: {{ e.message }}{% if not loop.last %}\n{% endif %}{% endfor %}

=== ERRORS (ui/backend lab runs) ===
{% for r in ui_runs %}{% if r.status == "error" %}{{ r.created_utc }} :: {{ r.mode }} :: error :: {{ r.id }} :: {{ (r.error or '') | replace('\\n','\n') }}{% if not loop.last %}\n{% endif %}{% endif %}{% endfor %}

=== RUN LOG TAILS (ui/backend errors) ===
{% for t in run_error_tails %}--- {{ t.created_utc }} :: {{ t.mode }} :: {{ t.id }} ---
{{ (t.tail or '') | replace('\\n','\n') }}
{% if not loop.last %}\n{% endif %}{% else %}(none){% endfor %}

=== UI/Backend LAB RUNS (recent) ===
{% for r in ui_runs %}{{ r.created_utc }} :: {{ r.mode }} :: {{ r.status }} :: {{ r.id }}{% if r.error %} :: {{ (r.error or '') | replace('\\n','\n') }}{% endif %}{% if not loop.last %}\n{% endif %}{% else %}(no runs){% endfor %}

=== AUDIT EVENTS (recent) ===
{% for e in events %}{% set a = audit_map.get(e.audit_run_id) %}{{ e.ts_ms }} {{ e.level }} {{ e.layer }} :: {{ (a.target_domain if a else e.audit_run_id) }} :: {{ e.message }}{% if not loop.last %}\n{% endif %}{% endfor %}
    </textarea>
  </section>
</div>

<script>
  async function copyText(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.focus(); el.select();
    try{ await navigator.clipboard.writeText(el.value); alert("Copiado."); }
    catch(e){ document.execCommand("copy"); alert("Copiado."); }
  }
</script>
{% endblock %}
